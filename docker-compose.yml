version: '3.8'

services:
  petflow-crm:
    build:
      context: ./petflow-crm
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Add necessary frontend environment variables here (or use .env.local file in petflow-crm)
      - NODE_ENV=production
    restart: unless-stopped

  petflow-agent:
    build:
      context: ./petflow-agent
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      # Add necessary backend environment variables here (or use .env file in petflow-agent)
      - PORT=3002
    restart: unless-stopped
