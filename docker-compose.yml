version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: petflow-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: petflow2.0db
      POSTGRES_PASSWORD: dssgrgodmmfeffbmertddgefvvmefvjfefvrgrvgg
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  petflow-crm:
    build:
      context: ./petflow-crm
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Add necessary frontend environment variables here (or use .env.local file in petflow-crm)
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - db

  petflow-agent:
    build:
      context: ./petflow-agent
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      # Add necessary backend environment variables here (or use .env file in petflow-agent)
      - PORT=3002
    restart: unless-stopped
    depends_on:
      - db

volumes:
  pgdata:
